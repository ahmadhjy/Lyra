server {
    listen 80;
    server_name lyraaiqat.com www.lyraaiqat.com 207.154.253.157;

    client_max_body_size 10M;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location /static/ {
        alias /home/lyra/lyra/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/home/lyra/lyra/lyra.sock;
    }
}
